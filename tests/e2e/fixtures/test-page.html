<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>desktop-touch CDP Test Page</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    .container { position: relative; width: 800px; min-height: 600px; background: white; padding: 20px; }
    #btn-submit {
      position: absolute;
      left: 100px; top: 200px;
      width: 120px; height: 40px;
      background: #4caf50; color: white;
      border: none; border-radius: 4px;
      cursor: pointer; font-size: 14px;
    }
    #btn-submit:hover { background: #43a047; }
    #input-name {
      position: absolute;
      left: 100px; top: 300px;
      width: 200px; height: 32px;
      border: 1px solid #ccc; border-radius: 4px;
      padding: 0 8px; font-size: 14px;
    }
    #link-next {
      position: absolute;
      left: 100px; top: 380px;
      font-size: 16px;
    }
    #text-result {
      position: absolute;
      left: 100px; top: 260px;
      font-size: 14px; color: #333;
    }
    #btn-hidden { display: none; }
    #section-scroll {
      position: absolute;
      left: 100px; top: 1000px;
      width: 200px; height: 50px;
      background: #e3f2fd;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="page-title" style="padding-top:20px;">CDP Test Page</h1>

    <button id="btn-submit">Submit</button>

    <div id="text-result"></div>

    <input id="input-name" type="text" placeholder="Enter name...">

    <a id="link-next" href="#next">Next Page</a>

    <!-- Hidden element for testing -->
    <button id="btn-hidden">Hidden Button</button>

    <!-- Below-fold element for scroll testing -->
    <div id="section-scroll">Below the fold</div>

    <!-- ──────────────────────────────────────────────────────────────── -->
    <!-- browser_search fixtures — cover all 5 "by" axes                    -->
    <!-- ──────────────────────────────────────────────────────────────── -->
    <div id="search-fixtures" style="position:absolute;left:100px;top:450px;width:600px;">
      <h2>Search Fixtures</h2>

      <!-- by:'text' — literal substring, case-sensitive toggles, regex -->
      <p class="search-text">Unique search needle alpha</p>
      <p class="search-text">Another needle appears here</p>
      <p class="search-text">Uppercase NEEDLE for case tests</p>

      <!-- by:'role' — explicit + implicit -->
      <nav role="navigation" id="search-nav">
        <a href="#nav1">Home</a>
        <a href="#nav2">About</a>
        <a href="#nav3">Contact</a>
      </nav>
      <button id="search-btn-submit">Submit Form</button>
      <button id="search-btn-cancel">Cancel</button>
      <button disabled id="search-btn-disabled">Disabled button</button>

      <!-- by:'ariaLabel' -->
      <input aria-label="Search query" id="search-input-query">
      <input aria-label="Email address" id="search-input-email">

      <!-- by:'selector' scope test -->
      <div id="search-scope-parent">
        <span>inside-scope-alpha</span>
        <span>inside-scope-beta</span>
      </div>
      <div id="search-scope-other">
        <span>outside-scope-gamma</span>
      </div>

      <!-- visibility penalty test -->
      <button style="display:none" id="search-btn-hidden-unique-marker">Hidden Unique Marker</button>

      <!-- ARIA toggle / radio / tab fixtures (Radix / shadcn / GitHub style) -->
      <button type="button" role="switch" aria-checked="true" id="aria-switch-on">Email notifications</button>
      <button type="button" role="switch" aria-checked="false" id="aria-switch-off">Web notifications</button>
      <button type="button" role="checkbox" aria-checked="true" id="aria-checkbox-on">Subscribe to updates</button>
      <button type="button" role="radio" aria-checked="false" id="aria-radio-off">Plan B</button>
      <button type="button" role="tab" aria-selected="true" id="aria-tab-active">Active tab</button>
      <button type="button" aria-pressed="true" id="aria-pressed-on">Pressed button</button>
      <button type="button" aria-expanded="false" id="aria-expanded-off">Expand</button>
    </div>

    <!-- ──────────────────────────────────────────────────────────────── -->
    <!-- Issue #441 fixtures — hidden/zero-size duplicate of a visible btn  -->
    <!-- GSC/Material-UI shape: a hidden div and a visible button share the -->
    <!-- same aria-label. document.querySelector picks the hidden one first -->
    <!-- (it precedes the button in DOM order) → zero-size; the rescue must -->
    <!-- click the visible button instead.                                  -->
    <!-- ──────────────────────────────────────────────────────────────── -->
    <!-- Hidden zero-size duplicate FIRST (querySelector default match), then the
         visible button. Positioned well inside an 800x600 headless viewport with
         no overlapping fixtures so the visible button's center hit-tests to itself. -->
    <div aria-label="Request Indexing" style="display:none">Request Indexing</div>
    <button type="button" aria-label="Request Indexing" id="dup441-visible-btn"
            style="position:absolute;left:300px;top:250px;"
            onclick="window._clickLog.push({ id: 'dup441-visible-btn', time: Date.now() });">Request Indexing</button>

    <!-- Off-viewport variant (scrollIntoView two-pass): hidden duplicate +
         a visible button parked far below the fold. Same aria-label. -->
    <div aria-label="Submit Far" style="display:none">Submit Far</div>
    <button type="button" aria-label="Submit Far" id="dup441-offviewport-btn"
            style="position:absolute;left:100px;top:4000px;"
            onclick="window._clickLog.push({ id: 'dup441-offviewport-btn', time: Date.now() });">Submit Far</button>

    <!-- Ambiguous variant: hidden zero-size duplicate FIRST, then TWO visible
         actionable buttons sharing the aria-label → the rescue must stop with
         BrowserAmbiguousTarget + candidates (never auto-click). Both in-viewport. -->
    <div aria-label="Ambiguous Dup" style="display:none">Ambiguous Dup</div>
    <button type="button" aria-label="Ambiguous Dup" id="dup441-amb-a"
            style="position:absolute;left:300px;top:320px;">Ambiguous Dup A</button>
    <button type="button" aria-label="Ambiguous Dup" id="dup441-amb-b"
            style="position:absolute;left:300px;top:380px;">Ambiguous Dup B</button>

    <!-- ──────────────────────────────────────────────────────────────── -->
    <!-- Issue #181 fixtures — CDP click/fill delivery verification        -->
    <!-- ──────────────────────────────────────────────────────────────── -->
    <div id="verify-fixtures" style="position:absolute;left:100px;top:780px;width:600px;">
      <h2>Verification Fixtures (#181)</h2>

      <!-- Bound button: the click adds a child node to its sibling so the
           MutationObserver fires on document.body subtree -->
      <button id="btn-verify-bound" type="button" style="margin:4px;">Bound</button>
      <div id="btn-verify-bound-target" style="margin:4px;font-family:monospace;"></div>

      <!-- Silent SPA button: rendered but with NO event listener at all.
           A click here must NOT mutate the DOM, change activeElement, or
           change location.href. The verification path should report
           hints.verifyDelivery.status='unverifiable' for this element. -->
      <button id="btn-verify-silent" type="button" style="margin:4px;">Silent (no listener)</button>

      <!-- Plain input: fill round-trips byte-for-byte. -->
      <input id="input-verify-plain" type="text" placeholder="Plain input" style="margin:4px;">

      <!-- "React controlled-input" simulator: an input element that filters
           non-digit characters out of its own value on each input event.
           This is the smallest possible reproduction of the false-positive
           that matrix doc §5.2 calls out: a fill arrives intact, the
           framework rewrites it, element.value mismatches the request,
           and the verification has to surface a sub-reason rather than
           hide-or-fail the call. -->
      <input id="input-verify-numbersonly" type="text" placeholder="numbers only" style="margin:4px;">
    </div>
  </div>

  <!-- SPA state fixtures for browser_get_app_state -->
  <script type="application/json" id="__NEXT_DATA__">{"props":{"pageProps":{"foo":"next-bar"}},"page":"/"}</script>
  <script type="application/json" data-target="react-app.embeddedData">{"payload":{"vulnerabilityEmail":true,"vulnerabilityWeb":false}}</script>
  <script type="application/ld+json">{"@type":"WebPage","name":"desktop-touch CDP Test Page"}</script>
  <script>window.__INITIAL_STATE__ = { user: "harusame64", count: 42 };</script>

  <script>
    // Track click events for test verification
    window._clickLog = [];

    document.getElementById('btn-submit').addEventListener('click', function() {
      window._clickLog.push({ id: 'btn-submit', time: Date.now() });
      document.getElementById('text-result').textContent = 'Clicked at ' + Date.now();
    });

    document.getElementById('input-name').addEventListener('input', function(e) {
      window._clickLog.push({ id: 'input-name', value: e.target.value, time: Date.now() });
    });

    // ── Issue #181: verification fixture wiring ──
    // Bound button mutates the DOM on click — verification should observe it.
    document.getElementById('btn-verify-bound').addEventListener('click', function() {
      var t = document.getElementById('btn-verify-bound-target');
      var span = document.createElement('span');
      span.textContent = 'clicked@' + Date.now() + ' ';
      t.appendChild(span);
    });

    // Silent button: NO listener, NO href, NO form submit. A click here
    // produces zero observable side effect — exactly the SPA silent-fail
    // signature that #181 catches.

    // Numbers-only filter — the smallest controlled-input reproduction.
    // After every input event we strip non-digits and write the cleaned
    // value back via the React-style native setter so element.value reflects
    // the framework's transformation.
    (function() {
      var input = document.getElementById('input-verify-numbersonly');
      if (!input) return;
      var setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
      input.addEventListener('input', function() {
        var cleaned = (input.value || '').replace(/[^0-9]/g, '');
        if (cleaned !== input.value) setter.call(input, cleaned);
      });
    })();
  </script>
</body>
</html>
