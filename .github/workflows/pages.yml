name: pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static site
        run: |
          rm -rf _site
          mkdir -p _site/articles
          cp site/*.html _site/ 2>/dev/null || true
          cp site/*.txt _site/ 2>/dev/null || true
          cp site/*.xml _site/ 2>/dev/null || true
          cp site/index.html _site/404.html
          cp site/articles/*.html _site/articles/ 2>/dev/null || true
          cp -R site/assets _site/assets
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
