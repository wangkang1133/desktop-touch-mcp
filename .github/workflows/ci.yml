name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'README.md'
      - 'README.ja.md'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'README.md'
      - 'README.ja.md'
      - '.github/workflows/pages.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Rust (MSVC toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check generated Linux stub catalog
        run: npm run check:stub-catalog

      - name: Check failWith callsite-shape fixtures (ADR-021 PR-P2-2 — codemod shape gate)
        # Regenerates the failWith callsite-shape catalogue and fails if it drifts
        # from source. Pairs with the frozen-golden bit-equality test
        # (tests/unit/path-class-contract/failwith-thin-wrapper.test.ts): a
        # callsite added/removed/reshaped without regenerating fails here, and a
        # novel context shape fails the test's Layer B coverage assertion.
        run: npm run check:failwith-fixtures

      - name: Check napi panic safety (ADR-007 §3.4 — sync #[napi] must use napi_safe_call)
        run: npm run check:napi-safe

      - name: Check native types (Rust #[napi] vs index.d.ts drift)
        run: npm run check:native-types

      - name: Check no koffi (ADR-007 §6 P4 acceptance — zero koffi.X call sites)
        run: npm run check:no-koffi

      - name: Check Rust workspace compiles (covers non-napi member crates)
        # `npm run build:rs:debug` only builds the root crate via napi-rs, so
        # workspace members like `engine-perception` (ADR-008 D1+) are not
        # exercised by the napi step alone. This explicit `cargo check
        # --workspace` ensures every workspace member compiles in CI.
        run: npm run check:rs-workspace

      - name: Fetch node.lib for MSVC linking
        shell: pwsh
        run: |
          # The custom build.rs links the native addon against node.lib at the
          # repo root. GitHub-hosted runners don't ship node.lib, so fetch it
          # via node-gyp (which caches headers + import lib per Node version).
          $ver = (node -v).TrimStart('v')
          Write-Host "Installing node-gyp headers for Node $ver"
          npx --yes node-gyp install --target=$ver
          $cache = "$env:LOCALAPPDATA\node-gyp\Cache"
          $found = Get-ChildItem -Path $cache -Recurse -Filter node.lib -ErrorAction SilentlyContinue |
                   Where-Object { $_.FullName -match '\\(x64|win-x64)\\node\.lib$' } |
                   Select-Object -First 1
          if (-not $found) { throw "node.lib not found in $cache" }
          Copy-Item -LiteralPath $found.FullName -Destination (Join-Path $PWD "node.lib")

      - name: Check Rust test targets compile (guards dep-API drift in #[cfg(test)] code)
        # `check:rs-workspace` only compiles non-test code, so test-only code —
        # e.g. the vision-gpu tokenizer tests under #[cfg(all(test, feature =
        # "vision-gpu"))] — can silently rot against upstream crate API changes
        # (tokenizers 0.21 moved `WordLevelBuilder::vocab` to AHashMap and made
        # `with_post_processor` take Option<_>). This `--no-run` step compiles
        # every test binary so that drift fails CI. We intentionally do NOT run
        # the tests here: the runtime unit suite is non-hermetic on the 2-core
        # windows runners (DXGI screen-capture / focus tests flake without a
        # live desktop), so a compile guard is the robust CI contract. Placed
        # after the node.lib fetch because the napi test binary links node.lib.
        run: npm run check:rs-test-compile

      - name: Build native addon (Rust → .node, debug profile for CI speed)
        run: npm run build:rs:debug

      - name: Type check & build
        run: npm run build

      - name: Envelope size SLO bench (ADR-010 P1 §5.6.1)
        # Pure pure-JS bench (no napi) measuring `desktop_state` envelope
        # serialised payload size for 5 representative scenarios. Exits 1
        # when any scenario exceeds ENVELOPE_MINIMAL_SIZE_THRESHOLD_BYTES
        # (1024 bytes), which would silently force `confidence: degraded`
        # at runtime. CI fails on SLO regression so the threshold is held
        # bit-equal with `src/tools/_envelope.ts` and ADR-010 §5.6.1.
        run: npm run bench:envelope-size

      # NOTE: full unit suite execution on windows-latest 2-core runners is
      # currently unreliable (every attempt — default maxForks:4, single
      # fork via --maxWorkers=1, threads pool, vmThreads pool — terminates
      # with "##[error]The operation was canceled." 5-6s into the run, after
      # the first 2 files complete but before the 3rd worker finishes
      # spawning). Likely a runner-infra interaction with how vitest spawns
      # forks on a small Windows VM. Investigated in PR #45; deferred.
      #
      # P0-1 (audit §8.1) is therefore PARTIALLY addressed:
      #   - Rust build:rs runs here → catches Rust regressions (was the
      #     bigger concern: tooling drift, FFI shape, build.rs node.lib).
      #   - TypeScript test execution is left to local pre-merge run via
      #     `npm run test:capture`. Audit doc and known-issues track this.
      #
      # IMPORTANT for local runs: rebuild the Rust addon (`npm run build:rs:debug`)
      # before `npm run test:capture` if any src/*.rs or Cargo.toml changed since
      # last build. A stale .node binary causes preprocess / vision_backend tests
      # to fail with confusing errors. See docs/release-process.md
      # "Local Pre-Merge Testing".

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Glama inspection image
        run: docker build -t desktop-touch-mcp-glama .
