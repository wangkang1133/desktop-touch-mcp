name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows release zip
    runs-on: windows-latest
    if: github.repository == 'Harusame64/desktop-touch-mcp'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up Rust (MSVC toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Fetch node.lib for MSVC linking
        shell: pwsh
        run: |
          # The custom build.rs links the addon against node.lib at the repo root.
          # GitHub-hosted runners don't ship node.lib, so fetch it via node-gyp
          # (which caches headers + import lib per Node version).
          $ver = (node -v).TrimStart('v')
          Write-Host "Installing node-gyp headers for Node $ver"
          npx --yes node-gyp install --target=$ver
          $cache = "$env:LOCALAPPDATA\node-gyp\Cache"
          $found = Get-ChildItem -Path $cache -Recurse -Filter node.lib -ErrorAction SilentlyContinue |
                   Where-Object { $_.FullName -match '\\(x64|win-x64)\\node\.lib$' } |
                   Select-Object -First 1
          if (-not $found) {
            Get-ChildItem -Path $cache -Recurse -Filter node.lib -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  candidate: $($_.FullName)" }
            throw "node.lib not found in $cache"
          }
          Copy-Item -LiteralPath $found.FullName -Destination (Join-Path $PWD "node.lib")
          Write-Host "Copied node.lib from $($found.FullName)"

      - name: Build native addon (Rust → .node)
        run: npm run build:rs

      - name: Prepare release directory
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "release_build"
          $zipPath = Join-Path $PWD "desktop-touch-mcp-windows.zip"

          Remove-Item -LiteralPath $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $releaseDir | Out-Null

          Copy-Item -LiteralPath "package.json" -Destination $releaseDir
          Copy-Item -LiteralPath "package-lock.json" -Destination $releaseDir
          Copy-Item -LiteralPath "LICENSE" -Destination $releaseDir
          Copy-Item -LiteralPath "README.md" -Destination $releaseDir
          Copy-Item -LiteralPath "README.ja.md" -Destination $releaseDir
          Copy-Item -LiteralPath "dist" -Destination $releaseDir -Recurse

          # Native addon: ESM loader + type defs + compiled .node binary at root.
          # dist/engine/native-engine.js imports "../../index.js" → needs index.js
          # at the release root alongside the .node file.
          Copy-Item -LiteralPath "index.js" -Destination $releaseDir
          Copy-Item -LiteralPath "index.d.ts" -Destination $releaseDir
          Copy-Item -Path "desktop-touch-engine.*.node" -Destination $releaseDir

          if (Test-Path -LiteralPath "assets") {
            Copy-Item -LiteralPath "assets" -Destination $releaseDir -Recurse
          }

          if (Test-Path -LiteralPath "bin") {
            $binDir = Join-Path $releaseDir "bin"
            New-Item -ItemType Directory -Path $binDir -Force | Out-Null
            Copy-Item -Path "bin\*.exe" -Destination $binDir -ErrorAction SilentlyContinue
          }

          $pkgPath = Join-Path $releaseDir "package.json"
          $pkg = Get-Content -Raw -LiteralPath $pkgPath | ConvertFrom-Json
          $pkg.main = "dist/index.js"
          $runtimeDeps = [ordered]@{}
          foreach ($name in @(
            "@modelcontextprotocol/sdk",
            "@nut-tree-fork/nut-js",
            "koffi",
            "sharp",
            "ws",
            "zod"
          )) {
            $runtimeDeps[$name] = $pkg.devDependencies.PSObject.Properties[$name].Value
          }
          $pkg | Add-Member -Force -NotePropertyName "dependencies" -NotePropertyValue $runtimeDeps
          if ($pkg.PSObject.Properties.Name -contains "bin") {
            $pkg.PSObject.Properties.Remove("bin")
          }
          if ($pkg.PSObject.Properties.Name -contains "files") {
            $pkg.PSObject.Properties.Remove("files")
          }
          if ($pkg.PSObject.Properties.Name -contains "scripts") {
            $pkg.PSObject.Properties.Remove("scripts")
          }
          $pkg | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $pkgPath -Encoding UTF8

      - name: Install production dependencies
        shell: pwsh
        run: |
          # Build a clean package.json with ONLY dependencies (no devDependencies)
          # in a completely isolated temp directory to avoid any npm parent-traversal
          # or cache interference from the workspace.
          $isolatedDir = Join-Path $env:TEMP "dtmcp-release-$(New-Guid)"
          New-Item -ItemType Directory -Path $isolatedDir | Out-Null

          # Read the release_build package.json (which has both dependencies and devDependencies)
          $releasePkg = Get-Content -Raw -LiteralPath "release_build\package.json" | ConvertFrom-Json

          # Create a minimal package.json with only the fields npm install needs
          $minimalPkg = [ordered]@{
            name         = $releasePkg.name
            version      = $releasePkg.version
            type         = "module"
            dependencies = [ordered]@{}
          }
          foreach ($prop in $releasePkg.dependencies.PSObject.Properties) {
            $minimalPkg.dependencies[$prop.Name] = $prop.Value
          }
          $minimalPkg | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath "$isolatedDir\package.json" -Encoding UTF8

          Write-Host "=== Isolated package.json ==="
          Get-Content "$isolatedDir\package.json"
          Write-Host "=== Installing in $isolatedDir ==="

          Push-Location $isolatedDir
          npm install --no-package-lock 2>&1 | Write-Host
          Pop-Location

          # Verify node_modules was actually created
          $nmPath = Join-Path $isolatedDir "node_modules"
          if (-not (Test-Path $nmPath)) {
            throw "FATAL: npm install produced no node_modules in $isolatedDir"
          }
          $count = (Get-ChildItem -Path $nmPath -Directory | Measure-Object).Count
          Write-Host "=== Installed $count top-level packages ==="
          if ($count -lt 5) {
            Get-ChildItem -Path $nmPath -Directory | ForEach-Object { Write-Host "  $_" }
            throw "FATAL: Expected 5+ top-level packages, got $count"
          }

          # Move the node_modules into release_build
          Move-Item -LiteralPath $nmPath -Destination "release_build\node_modules"

      - name: Prune release package metadata
        shell: pwsh
        run: |
          $pkgPath = Join-Path $PWD "release_build\package.json"
          $pkg = Get-Content -Raw -LiteralPath $pkgPath | ConvertFrom-Json
          if ($pkg.PSObject.Properties.Name -contains "devDependencies") {
            $pkg.PSObject.Properties.Remove("devDependencies")
          }
          $pkg | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $pkgPath -Encoding UTF8

      - name: Create zip
        shell: pwsh
        run: |
          # Compress-Archive silently drops files in deeply nested node_modules (e.g. @modelcontextprotocol/sdk).
          # Use 7-Zip which is pre-installed on windows-latest runners.
          Push-Location release_build
          & "C:\Program Files\7-Zip\7z.exe" a -tzip "..\desktop-touch-mcp-windows.zip" "." -r
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "7z failed with exit code $LASTEXITCODE" }

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-touch-mcp-windows.zip
          fail_on_unmatched_files: true

  npm-publish:
    name: Publish to npm (OIDC)
    runs-on: ubuntu-latest
    needs: windows-release
    if: github.repository == 'Harusame64/desktop-touch-mcp'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      # v1.0.2 fix: setup-node@v4 ships npm 10.9.7 with Node 22, but OIDC
      # automatic token exchange for Trusted Publishing is only fully wired
      # in npm 11.5.1+. Without the upgrade, `npm publish` falls back to
      # NODE_AUTH_TOKEN (unset → anonymous PUT) and the registry returns 404.
      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest

      # Install dev deps so the `prepare: tsc` lifecycle that `npm publish`
      # triggers can resolve @types/node, zod, and the MCP SDK.
      # `--ignore-scripts` was supposed to skip prepare entirely, but in
      # npm 11+ the publish flow still runs it for tarball staging. Cheaper
      # to install deps than to refactor the lifecycle.
      - name: Install dependencies
        run: npm ci

      - name: Get and validate version from tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not in vX.Y.Z format"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download release zip, verify contents, compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          ZIP_URL="https://github.com/Harusame64/desktop-touch-mcp/releases/download/v${VERSION}/desktop-touch-mcp-windows.zip"
          for i in $(seq 1 30); do
            if curl -fL -o release.zip "$ZIP_URL"; then
              break
            fi
            echo "Asset not yet available, retry $i/30 (sleeping 10s)"
            sleep 10
          done
          if [ ! -f release.zip ]; then
            echo "::error::Failed to download release zip after 30 retries"
            exit 1
          fi
          unzip -l release.zip | grep -qE '[[:space:]]dist/index\.js$' || {
            echo "::error::dist/index.js missing from release zip"
            exit 1
          }
          SHA256=$(sha256sum release.zip | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          rm release.zip

      - name: Update SHA256 in launcher.js
        env:
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: node scripts/update-sha.mjs "$SHA256"

      - name: Verify manifest
        run: npm run check:launcher-manifest

      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance

      - name: Verify npm publish
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          for i in $(seq 1 12); do
            PUBLISHED=$(npm view "@harusame64/desktop-touch-mcp" dist-tags.latest 2>/dev/null || echo "")
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "npm publish verified: $PUBLISHED"
              exit 0
            fi
            echo "Waiting for npm registry propagation ($i/12, got: $PUBLISHED)"
            sleep 10
          done
          echo "::error::Expected $VERSION on npm, got $PUBLISHED"
          exit 1
